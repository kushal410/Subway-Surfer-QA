<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Subway Surfer Prototype</title>
    <style>
        body {
            margin: 0;
            background-color: #05050a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Century Gothic', sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 4px solid #1a1a2e;
            border-radius: 12px;
            background-color: #0a0a16;
            box-shadow: 0 0 40px rgba(255, 0, 128, 0.2);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="500" height="700"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- GAME STATE ---
    const LANES = [100, 250, 400]; // Lane X targets
    let currentLane = 1;
    let score = 0;
    let coinsCollected = 0;
    let gameOver = false;
    let speed = 8;
    let gameDistance = 0;

    // --- PLAYER OBJECT ---
    let player = {
        x: LANES[currentLane],
        y: 580,
        targetX: LANES[currentLane],
        width: 35,
        height: 60,
        jumpY: 0,
        vy: 0,
        isJumping: false,
        hasHoverboard: false,
        boardDuration: 0
    };

    // --- ARRAYS ---
    let entities = []; // Holds trains, barriers, and coins
    let particles = []; // Sparkles and board trails

    // --- CONTROLS ---
    window.addEventListener("keydown", (e) => {
        if (gameOver) {
            if (e.key === "Enter") resetGame();
            return;
        }

        if ((e.key === "ArrowLeft" || e.key.toLowerCase() === "a") && currentLane > 0) {
            currentLane--;
        }
        if ((e.key === "ArrowRight" || e.key.toLowerCase() === "d") && currentLane < 2) {
            currentLane++;
        }
        if ((e.key === "ArrowUp" || e.key === " ") && !player.isJumping) {
            player.vy = -14; // Jump force
            player.isJumping = true;
        }
        if (e.key === "Shift" && !player.hasHoverboard) {
            player.hasHoverboard = true;
            player.boardDuration = 400; // Lasts for 400 frames
            createExplosion(player.x, player.y + 20, "#00ffff", 15);
        }
        player.targetX = LANES[currentLane];
    });

    function resetGame() {
        currentLane = 1;
        player.x = LANES[currentLane];
        player.targetX = LANES[currentLane];
        player.jumpY = 0;
        player.vy = 0;
        player.isJumping = false;
        player.hasHoverboard = false;
        entities = [];
        particles = [];
        score = 0;
        coinsCollected = 0;
        speed = 8;
        gameOver = false;
    }

    // --- SPAWNER ENGINE ---
    function spawnEntity() {
        if (Math.random() < 0.04) {
            let typeRand = Math.random();
            let randLane = Math.floor(Math.random() * 3);
            let entityType = "barrier";

            if (typeRand < 0.4) entityType = "coin";
            else if (typeRand < 0.75) entityType = "train";

            // Prevent stacking items directly on top of each other at start
            if (entities.filter(e => e.lane === randLane && e.z < 200).length === 0) {
                entities.push({
                    lane: randLane,
                    z: 0, // Depth parameter (0 = distant horizon, 700 = screen bottom)
                    type: entityType,
                    collected: false
                });
            }
        }
    }

    function createExplosion(x, y, color, count) {
        for(let i=0; i<count; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                size: Math.random() * 4 + 1,
                color: color,
                alpha: 1
            });
        }
    }

    // --- CORE LOOP PHYSICS ---
    function update() {
        if (gameOver) return;

        gameDistance += speed;
        score = Math.floor(gameDistance / 10);

        // Interpolation for smooth side-to-side lane sliding
        player.x += (player.targetX - player.x) * 0.25;

        // Jump physics arc
        if (player.isJumping) {
            player.jumpY += player.vy;
            player.vy += 0.7; // Gravity acceleration
            if (player.jumpY >= 0) {
                player.jumpY = 0;
                player.vy = 0;
                player.isJumping = false;
            }
        }

        // Hoverboard duration mechanics
        if (player.hasHoverboard) {
            player.boardDuration--;
            // Neon pink/blue running trails
            particles.push({
                x: player.x + (Math.random() * 20 - 10),
                y: player.y + 10,
                vx: (Math.random() - 0.5) * 2,
                vy: Math.random() * 2 + 2,
                size: Math.random() * 3 + 2,
                color: Math.random() > 0.5 ? "#ff007f" : "#00ffff",
                alpha: 1
            });
            if (player.boardDuration <= 0) player.hasHoverboard = false;
        }

        // Update active particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy;
            p.alpha -= 0.03;
            if (p.alpha <= 0) particles.splice(i, 1);
        }

        // Object generation tick
        spawnEntity();

        // Process Objects approaching the viewport
        for (let i = entities.length - 1; i >= 0; i--) {
            let e = entities[i];
            e.z += speed; // Bring objects closer

            // Calculate pseudo-3D perspective mapping transformations
            let screenX = canvas.width / 2 + (LANES[e.lane] - canvas.width / 2) * (e.z / 600);
            let screenY = 220 + (e.z * 0.65);
            let sizeScale = (e.z / 600);

            // Collision check window (when object reaches player depth)
            if (e.z > 530 && e.z < 590 && e.lane === currentLane) {
                if (e.type === "coin" && !e.collected) {
                    e.collected = true;
                    coinsCollected++;
                    createExplosion(screenX, screenY, "#ffd700", 8);
                    entities.splice(i, 1);
                    continue;
                } 
                else if (e.type === "barrier" && player.jumpY > -25) { // Hit obstacle on ground
                    handleCrash(i);
                } 
                else if (e.type === "train" && (!player.isJumping || player.jumpY > -50)) { // Hit train
                    handleCrash(i);
                }
            }

            // Clean up off-screen assets
            if (e.z > 700) entities.splice(i, 1);
        }

        // Gradually increase pacing velocity over time
        if (score % 100 === 0 && speed < 16) speed += 0.01;
    }

    function handleCrash(index) {
        if (player.hasHoverboard) {
            player.hasHoverboard = false; // Break shield
            player.boardDuration = 0;
            createExplosion(player.x, player.y, "#ff0055", 25);
            entities.splice(index, 1); // Delete obstacle crashed into
        } else {
            gameOver = true;
        }
    }

    // --- RENDERING ART MATRICES ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Sky & Neon Horizon Gradient
        let skyGrad = ctx.createLinearGradient(0, 0, 0, 220);
        skyGrad.addColorStop(0, "#020208");
        skyGrad.addColorStop(1, "#18002a");
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, canvas.width, 220);

        // City Horizon Distant Lights
        ctx.fillStyle = "#2c003e";
        ctx.fillRect(40, 180, 50, 40);
        ctx.fillRect(120, 150, 70, 70);
        ctx.fillRect(320, 160, 60, 60);

        // Pseudo-3D Perspective Railway Tracks
        ctx.strokeStyle = "#3f3f5a";
        ctx.lineWidth = 3;
        ctx.beginPath();
        // Lane vanishing guide dividers lines
        ctx.moveTo(canvas.width / 2, 220); ctx.lineTo(-100, canvas.height);
        ctx.moveTo(canvas.width / 2, 220); ctx.lineTo(130, canvas.height);
        ctx.moveTo(canvas.width / 2, 220); ctx.lineTo(370, canvas.height);
        ctx.moveTo(canvas.width / 2, 220); ctx.lineTo(600, canvas.height);
        ctx.stroke();

        // Render oncoming items using scale projection math
        entities.forEach(e => {
            if (e.collected) return;

            let scale = (e.z / 600);
            let screenX = canvas.width / 2 + (LANES[e.lane] - canvas.width / 2) * scale;
            let screenY = 220 + (e.z * 0.65);
            let w = 60 * scale;
            let h = 80 * scale;

            ctx.save();
            if (e.type === "coin") {
                // Gold Coin Mesh
                ctx.fillStyle = "#ffd700";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#ffcc00";
                ctx.beginPath();
                ctx.arc(screenX, screenY - 10, 12 * scale, 0, Math.PI * 2);
                ctx.fill();
            } 
            else if (e.type === "barrier") {
                // Construction striped wooden barrier unit
                ctx.fillStyle = "#ff6b6b";
                ctx.fillRect(screenX - w/2, screenY - h/3, w, h/4);
                ctx.fillStyle = "#000";
                ctx.fillRect(screenX - w/4, screenY - h/3, w/2, 4); // Stripes
            } 
            else if (e.type === "train") {
                // Transit Freight Subway Car block
                let trainGrad = ctx.createLinearGradient(screenX - w/2, 0, screenX + w/2, 0);
                trainGrad.addColorStop(0, "#0052d4");
                trainGrad.addColorStop(1, "#4364f7");
                ctx.fillStyle = trainGrad;
                ctx.fillRect(screenX - w/2, screenY - h, w, h);
                // Windshield window grill
                ctx.fillStyle = "#00f2fe";
                ctx.fillRect(screenX - w/3, screenY - h + 10 * scale, (w/3)*2, 15 * scale);
            }
            ctx.restore();
        });

        // Draw FX Trails Buffer
        particles.forEach(p => {
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });

        // --- DRAW ACTIVE SURFER CHARACTER ---
        ctx.save();
        let py = player.y + player.jumpY;

        // Hoverboard Sprite Base Active Mount
        if (player.hasHoverboard) {
            let boardGrad = ctx.createLinearGradient(player.x - 20, 0, player.x + 20, 0);
            boardGrad.addColorStop(0, "#00ffff");
            boardGrad.addColorStop(1, "#ff007f");
            ctx.fillStyle = boardGrad;
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#00ffff";
            ctx.fillRect(player.x - 22, py + 8, 44, 8); // Board deck
            ctx.shadowBlur = 0;
        }

        // Character Main Body Silhouette
        ctx.fillStyle = "#e94560"; // Vibrant hoodie jacket
        ctx.fillRect(player.x - player.width / 2, py - player.height, player.width, player.height);
        // Head / Cap asset block
        ctx.fillStyle = "#ffcd94";
        ctx.fillRect(player.x - 10, py - player.height - 18, 20, 18);
        ctx.fillStyle = "#0f3460"; // Cool blue cap
        ctx.fillRect(player.x - 12, py - player.height - 22, 24, 6);

        ctx.restore();

        // --- TERMINAL HUD USER INTERFACE ---
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 20px sans-serif";
        ctx.fillText(`SCORE: ${score.toString().padStart(5, '0')}`, 25, 40);
        
        ctx.fillStyle = "#ffd700";
        ctx.fillText(`COINS: ${coinsCollected}`, 25, 70);

        if (player.hasHoverboard) {
            ctx.fillStyle = "#00ffff";
            ctx.font = "bold 13px sans-serif";
            ctx.fillText(`HOVERBOARD ENERGY: ${player.boardDuration}`, 25, 100);
        }

        // Game Over Panel Window Overlay
        if (gameOver) {
            ctx.fillStyle = "rgba(5, 5, 15, 0.9)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ff0055";
            ctx.font = "bold 42px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("CAUGHT BY INSPECTOR", canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.fillStyle = "#ffffff";
            ctx.font = "18px sans-serif";
            ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 25);
            ctx.fillText("Press ENTER key to Run Again", canvas.width / 2, canvas.height / 2 + 60);
            ctx.textAlign = "left";
        }
    }

    // --- TIMESTEP CLOCK LOOP ---
    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    loop();
</script>

</body>
</html>
