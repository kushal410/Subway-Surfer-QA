<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Frost Runner 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="gameContainer">
        <!-- Main Game Renderer -->
        <canvas id="gameCanvas" width="540" height="760"></canvas>

        <!-- HUD Layer -->
        <div id="hud">
            <div class="hud-box">
                <div class="hud-label">SCORE</div>
                <div id="scoreVal" class="hud-value">000000</div>
            </div>
            <div class="hud-box">
                <div class="hud-label">COINS</div>
                <div id="coinVal" class="hud-value" style="color: #fbbf24;">🪙 0</div>
            </div>
        </div>

        <!-- Start / Pause / Game Over Screens -->
        <div id="overlay" class="screen-overlay">
            <div id="screenContent">
                <h1 id="screenTitle">FROST RUNNER</h1>
                <p id="screenSubtitle">A Modern Pseudo-3D Endless Journey</p>
                <button id="actionBtn">START RUN</button>
                <div id="controlHacks" class="desktop-only">
                    <p><strong>Controls:</strong> Arrow Keys / WASD to Move, Jump & Slide</p>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
